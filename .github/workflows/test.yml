name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Action
        run: npm run build

      - name: Run unit tests
        run: npm test

      # ── Self-test: run the Action itself ──────────────────────────
      - name: Generate test inbox (self-test)
        id: inbox
        uses: ./  # Use local version of this Action

      - name: Verify inbox output is set
        run: |
          if [ -z "${{ steps.inbox.outputs.inbox }}" ]; then
            echo "ERROR: inbox output is empty"
            exit 1
          fi
          if [ -z "${{ steps.inbox.outputs.inbox_name }}" ]; then
            echo "ERROR: inbox_name output is empty"
            exit 1
          fi
          echo "✓ inbox: ${{ steps.inbox.outputs.inbox }}"
          echo "✓ inbox_name: ${{ steps.inbox.outputs.inbox_name }}"

      - name: Verify inbox format
        run: |
          INBOX="${{ steps.inbox.outputs.inbox }}"
          if [[ ! "$INBOX" =~ ^[a-z]+-[a-z0-9]+@zerodrop-sandbox\.online$ ]]; then
            echo "ERROR: inbox format invalid: $INBOX"
            exit 1
          fi
          echo "✓ inbox format valid: $INBOX"
